<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>服务器列表 - 云·鸣潮</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
  <header class="bg-gradient-to-r from-sky-800 via-indigo-700 to-purple-700">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3">
        <img src="/assets/logo.svg" alt="logo" class="w-10 h-10" />
        <span class="text-xl font-semibold">云·鸣潮</span>
      </a>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-6 py-12">
    <h1 class="text-3xl font-bold">服务器 / 大区 列表</h1>
    <div class="mt-6 space-y-4">
      <div class="p-4 bg-gray-800 rounded flex justify-between items-center">
        <div>
          <div class="font-medium">大区 A - 服务器 1</div>
          <div class="text-sm text-gray-400">在线：1200 人</div>
        </div>
        <div class="text-sm">
          <button class="px-3 py-1 bg-indigo-600 rounded">进入</button>
        </div>
      </div>
      <div class="p-4 bg-gray-800 rounded flex justify-between items-center">
        <div>
          <div class="font-medium">大区 B - 服务器 2</div>
          <div class="text-sm text-gray-400">在线：320 人</div>
        </div>
        <div class="text-sm">
          <button class="px-3 py-1 bg-indigo-600 rounded">进入</button>
        </div>
      </div>
    </div>
  </main>
  <footer class="border-t border-gray-800 mt-12 py-6 text-center text-sm text-gray-400">© 2026 云·鸣潮</footer>
</body>
</html>
