<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 - 云·鸣潮</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
  <main class="min-h-screen flex items-center justify-center">
    <form class="w-full max-w-md bg-gray-800 p-8 rounded">
      <h1 class="text-2xl font-semibold mb-6">账号登录</h1>
      <label class="block text-sm">邮件 / 账号 <input class="mt-2 w-full p-2 rounded bg-gray-900" /></label>
      <label class="block text-sm mt-4">密码 <input type="password" class="mt-2 w-full p-2 rounded bg-gray-900" /></label>
      <div class="mt-6 flex items-center justify-between">
        <a class="text-sm text-gray-400" href="/register.html">没有账号？注册</a>
        <button class="px-4 py-2 bg-indigo-600 rounded">登录</button>
      </div>
    </form>
  </main>
</body>
</html>
